<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hackathon Tracker 🚀</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <div class="header-top">
      <h1>🚀 Hackathon Tracker</h1>
      <div class="header-meta">
        <span id="last-updated"></span>
        <button id="refresh-btn" onclick="forceRefresh()">🔄 Refresh</button>
      </div>
    </div>
    <p class="subtitle">Live ongoing hackathons from Devpost, Unstop & DoraHacks</p>

    <div class="search-bar">
      <input type="text" id="search" placeholder="🔍 Search hackathons..." oninput="filterCards()" />
    </div>

    <div id="filters">
      <button class="filter-btn active" data-source="All">All</button>
      <button class="filter-btn devpost" data-source="Devpost">Devpost</button>
      <button class="filter-btn unstop" data-source="Unstop">Unstop</button>
      <button class="filter-btn dorahacks" data-source="DoraHacks">DoraHacks</button>
    </div>
  </header>

  <main>
    <div id="stats"></div>
    <div id="hackathon-grid"></div>
    <div id="no-results" style="display:none">
      <p>😕 No hackathons found. Try a different search or filter.</p>
    </div>
  </main>

  <footer>
    <p>Data refreshes every 6 hours automatically · Built with Node.js & Express</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
